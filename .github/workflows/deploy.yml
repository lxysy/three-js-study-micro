name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install shell dependencies
        run: npm ci

      - name: Generate demo registry
        run: node scripts/prepare-registry.js

      - name: Prepare shared Three.js deps
        run: node scripts/prepare-shared-deps.js

      - name: Build Type A demos (importmap)
        run: node scripts/build-type-a.js

      - name: Build Type B demos (Vite)
        run: node scripts/build-type-b.js
        env:
          NODE_ENV: production

      - name: Build shell app
        run: npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
